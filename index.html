<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>for raaji</title>
  <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&family=Quicksand:wght@500;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #fff0f0 0%, #ffd6d6 40%, #ffb6c1 100%);
      font-family: 'Indie Flower', cursive;
      letter-spacing: 0.5px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2rem;
      color: #7a2e10;
      letter-spacing: 0.5px;
      text-align: center;
      margin-bottom: 40px;
    }

    .cards {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(8px);
      border-radius: 16px;
      width: 140px;
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      box-shadow: 0 4px 20px rgba(200,100,60,0.12);
      border: 2px solid rgba(255,200,160,0.6);
      transition: transform 0.18s, box-shadow 0.18s;
      gap: 4px;
      font-family: 'Quicksand', sans-serif;
    }

    .card:active {
      transform: scale(0.95);
      box-shadow: 0 2px 10px rgba(200,100,60,0.1);
    }

    .card-month {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #e07040;
      background: #ffe8d6;
      width: 100%;
      text-align: center;
      padding: 6px 0;
      border-radius: 12px 12px 0 0;
      position: absolute;
      top: 0;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-top: 28px;
      gap: 2px;
    }

    .card-day {
      font-size: 2.4rem;
      font-weight: 700;
      color: #5a1e08;
      line-height: 1;
    }

    .card-year {
      font-size: 0.72rem;
      font-weight: 500;
      color: #b07050;
    }
  </style>
</head>
<body>

  <h1>for raaji ♡</h1>

  <div class="cards">

    <a class="card" href="01-first/index.html" style="position:relative;overflow:hidden;">
      <div class="card-inner">
        <div class="card-month">February</div>
        <div class="card-day">14</div>
        <div class="card-year">2026</div>
      </div>
    </a>

    <a class="card" href="02-decompression/index.html" style="position:relative;overflow:hidden;">
      <div class="card-inner">
        <div class="card-month">April</div>
        <div class="card-day">16</div>
        <div class="card-year">2026</div>
      </div>
    </a>

  </div>

</body>
</html>
